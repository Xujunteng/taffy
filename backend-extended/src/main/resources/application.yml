server:
  port: 8083

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:sqlite:../data/taffy.db}
    driver-class-name: org.sqlite.JDBC

mybatis:
  type-aliases-package: com.taffy.entity
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: ${JWT_SECRET:taffy-live-assistant-jwt-secret-key-2026}
  expiration: ${JWT_EXPIRATION:86400000}
