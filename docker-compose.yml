services:
  nginx:
    image: nginx:alpine
    container_name: taffy-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./taffy-frontend-v2/dist:/usr/share/nginx/html:ro
      - ./data/audio:/data/audio:ro
    depends_on:
      - backend-main
      - backend-voice-ai
      - backend-extended
    networks:
      - taffy-network

  backend-main:
    image: amazoncorretto:17-alpine
    container_name: taffy-backend-main
    working_dir: /app
    command: java -jar /app/app.jar
    environment:
      - SPRING_DATASOURCE_URL=jdbc:sqlite:/app/data/taffy.db
    volumes:
      - ./backend-main/target/backend-main-1.0.0.jar:/app/app.jar:ro
      - ./data:/app/data
    networks:
      - taffy-network

  backend-voice-ai:
    image: amazoncorretto:17-alpine
    container_name: taffy-backend-voice-ai
    working_dir: /app
    command: >
      sh -c "apk add --no-cache ffmpeg python3 py3-pip &&
             pip3 install --no-cache-dir --break-system-packages edge-tts &&
             java -jar /app/app.jar"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:sqlite:/app/data/taffy.db
      - VOICE_AI_STORAGE_ROOT=/app/data/audio
    volumes:
      - ./backend-voice-ai/target/backend-voice-ai-1.0.0.jar:/app/app.jar:ro
      - ./data:/app/data
    networks:
      - taffy-network

  backend-extended:
    image: amazoncorretto:17-alpine
    container_name: taffy-backend-extended
    working_dir: /app
    command: java -jar /app/app.jar
    environment:
      - SPRING_DATASOURCE_URL=jdbc:sqlite:/app/data/taffy.db
    volumes:
      - ./backend-extended/target/backend-extended-1.0.0.jar:/app/app.jar:ro
      - ./data:/app/data
    networks:
      - taffy-network

networks:
  taffy-network:
    driver: bridge
