version: '3.8'

services:
  frontend:
    build: ./taffy-frontend-v2
    container_name: taffy-frontend
    volumes:
      - dist:/app/dist

  nginx:
    image: nginx:alpine
    container_name: taffy-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - dist:/usr/share/nginx/html:ro
      - ./data/audio:/data/audio:ro
    depends_on:
      - frontend
      - backend-main
      - backend-voice-ai
      - backend-extended
    networks:
      - taffy-network

volumes:
  dist:

  backend-main:
    build:
      context: ./backend-main
      dockerfile: Dockerfile
    container_name: taffy-backend-main
    ports:
      - "8081:8081"
    volumes:
      - ./data:/app/data
    networks:
      - taffy-network

  backend-voice-ai:
    build:
      context: ./backend-voice-ai
      dockerfile: Dockerfile
    container_name: taffy-backend-voice-ai
    ports:
      - "8082:8082"
    volumes:
      - ./data:/app/data
    networks:
      - taffy-network

  backend-extended:
    build:
      context: ./backend-extended
      dockerfile: Dockerfile
    container_name: taffy-backend-extended
    ports:
      - "8083:8083"
    volumes:
      - ./data:/app/data
    networks:
      - taffy-network

networks:
  taffy-network:
    driver: bridge