server:
  port: 8081

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:sqlite:../data/taffy.db}
    driver-class-name: org.sqlite.JDBC
  sql:
    init:
      mode: never
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.taffy.entity
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: ${JWT_SECRET:taffy-live-assistant-jwt-secret-key-2026}
  expiration: ${JWT_EXPIRATION:86400000}

app:
  file:
    upload-dir: ../data/audio