server:
  port: 8082

spring:
  datasource:
    url: jdbc:sqlite:./data/taffy.db
    driver-class-name: org.sqlite.JDBC
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

mybatis:
  type-aliases-package: com.taffy.entity
  configuration:
    map-underscore-to-camel-case: true

# JWT认证配置
jwt:
  secret: taffy-live-assistant-jwt-secret-key-2026
  expiration: 86400000

# 语音AI服务配置
voice-ai:
  storage-root: ./data/audio
  aliyun:
    enabled: false
    access-key-id: your-access-key-id
    access-key-secret: your-access-key-secret
    app-key: your-app-key
    endpoint: https://nls-gateway.cn-shanghai.aliyuncs.com
