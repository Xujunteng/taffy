server:
  port: 8082

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:sqlite:../data/taffy.db}
    driver-class-name: org.sqlite.JDBC
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

mybatis:
  type-aliases-package: com.taffy.entity
  configuration:
    map-underscore-to-camel-case: true

# JWT认证配置
jwt:
  secret: ${JWT_SECRET:taffy-live-assistant-jwt-secret-key-2026}
  expiration: ${JWT_EXPIRATION:86400000}

# 语音AI服务配置
voice-ai:
  storage-root: ${VOICE_AI_STORAGE_ROOT:./data/audio}
  # edge-tts: 微软Edge神经网络语音（免费，中文质量优秀）
  # 安装: pip install edge-tts && apt install ffmpeg
  edge-tts:
    command: ${EDGE_TTS_COMMAND:auto}
    voice: ${EDGE_TTS_VOICE:auto}
  aliyun:
    enabled: false
